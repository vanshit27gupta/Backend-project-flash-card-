<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Flash Cards</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student Flash Cards</h1>
            <p>College Project: Student Profile Display</p>
        </header>

        <section class="registration-form">
            <h2>Add New Student</h2>
            <form id="student-form">
                <div class="form-group">
                    <label for="student-name">Student Name:</label>
                    <input type="text" id="student-name" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label for="student-id-input">Student ID:</label>
                    <input type="text" id="student-id-input" placeholder="Enter ID (e.g. STU2024007)" required>
                </div>
                <div class="form-group">
                    <label for="student-course-input">Course:</label>
                    <input type="text" id="student-course-input" placeholder="Enter Course (e.g. B.Tech)" required>
                </div>
                <div class="form-group">
                    <label for="student-photo-input">Upload Photo:</label>
                    <input type="file" id="student-photo-input" accept="image/*" required>
                </div>
                <button type="submit" id="submit-btn">Register & Upload</button>
            </form>
        </section>

        <div id="card-container" class="card-grid">
            <!-- Student cards will be loaded dynamically by script.js -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
